<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <!-- Bubbles -->
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
        
        <!-- White Fish -->
        <svg class="white-fish" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#ffffff"><path d="M495.2 216c-31.5-34.8-111-66-189.7-41C250.7 131.7 172.9 85.5 130 92.5c-42.9 7-40.4 69.5-38.3 93.3C44.7 190.5 10.7 200 4.1 206.5c-6.8 6.8-6.1 18.2 2 24.3 10.5 7.9 31.9 16.1 63 19.3-3 23.3-13.1 82.5 35.1 82.5 45.4 0 108.6-43.9 157.1-82.6 63.8 33.6 142.1 27.2 190 7.3 11-4.6 44.7-18.4 43.9-41.3-.9-22.9-31.1-28.7-43.9-33.1zM296 256c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24z"/></svg>
    </div>
    
    <div class="container">
        <header>
            <h1>Task Portal</h1>
            <p>Manage your daily goals efficiently</p>
        </header>
        
        <main class="dashboard">
            <section class="task-form-container glass-panel">
                <h2>Create New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-name">Task Name</label>
                        <input type="text" id="task-name" required placeholder="What needs to be done?">
                    </div>
                    
                    <div class="form-group switch-group" style="margin-bottom: 1rem;">
                        <label for="today-task">Quick Select: Today</label>
                        <label class="switch">
                            <input type="checkbox" id="today-task">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="start-date">Start Date</label>
                            <input type="date" id="start-date" required>
                        </div>
                        <div class="form-group">
                            <label for="completion-date">Completion Date</label>
                            <input type="date" id="completion-date" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" required>
                                <option value="Urgent">Urgent</option>
                                <option value="High">High</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Low">Low</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="Meeting">Meeting</option>
                                <option value="Follow-up">Follow-up</option>
                                <option value="Documentation">Documentation</option>
                                <option value="Bug follow-up">Bug follow-up</option>
                                <option value="Client follow up">Client follow up</option>
                                <option value="Team meet">Team meet</option>
                                <option value="App development">App development</option>
                                <option value="Agreement follow-up">Agreement follow-up</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group switch-group">
                        <label for="reminder">Set Reminder</label>
                        <label class="switch">
                            <input type="checkbox" id="reminder">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Task</button>
                </form>
            </section>
            
            <section class="task-list-container glass-panel">
                <div class="list-header">
                    <h2>Your Tasks</h2>
                </div>
                <div id="task-list" class="task-list">
                    <!-- Tasks will be injected here via JS -->
                </div>
            </section>
        </main>
    </div>
</body>
</html>
